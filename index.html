<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BLACKFILM Survey</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px;
    }

    h1 {
      margin-bottom: 20px;
    }

    .box {
      background: #1c1c1c;
      padding: 20px;
      border-radius: 12px;
      width: 100%;
      max-width: 500px;
    }

    input, button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
    }

    button {
      background: #ffcc00;
      font-weight: bold;
      cursor: pointer;
    }

    .item {
      background: #2a2a2a;
      margin-top: 10px;
      padding: 10px;
      border-radius: 8px;
    }
  </style>
</head>
<body>

  <h1>BLACKFILM Survey</h1>

  <div class="box">
    <input id="answer" placeholder="답변 입력" />
    <button onclick="submitAnswer()">전송</button>
  </div>

  <div class="box" style="margin-top:20px;">
    <h3>실시간 응답</h3>
    <div id="list"></div>
  </div>


  <!-- Firebase SDK -->
  <script type="module">

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    // 🔥 너 Firebase 설정 그대로 사용
    const firebaseConfig = {
      apiKey: "AIzaSyDovLKo3djdRbs963vqKdbj-geRWyzMTrg",
      authDomain: "blackfilm-survey.firebaseapp.com",
      projectId: "360900276842",
      storageBucket: "blackfilm-survey.appspot.com",
      messagingSenderId: "360900276842",
      appId: "1:360900276842:web:demo"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // ✅ 저장
    window.submitAnswer = async function () {
      const val = document.getElementById("answer").value;
      if (!val) return alert("내용 입력하세요");

      await addDoc(collection(db, "survey"), {
        answer: val,
        time: new Date()
      });

      document.getElementById("answer").value = "";
    };

    // ✅ 실시간 출력
    const q = query(collection(db, "survey"), orderBy("time", "desc"));

    onSnapshot(q, (snapshot) => {
      const list = document.getElementById("list");
      list.innerHTML = "";

      snapshot.forEach((doc) => {
        const data = doc.data();
        const div = document.createElement("div");
        div.className = "item";
        div.innerText = data.answer;
        list.appendChild(div);
      });
    });

  </script>

</body>
</html>
