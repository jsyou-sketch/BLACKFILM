<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>BLACKFILM 설문</title>
</head>
<body>
  <h2>설문 입력</h2>

  <input id="name" placeholder="이름" />
  <br><br>

  <input id="answer" placeholder="답변" />
  <br><br>

  <button id="submitBtn">제출</button>

  <p id="status"></p>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // ✅ 스크린샷과 100% 일치하도록 검수된 설정
    const firebaseConfig = {
      apiKey: "AIzaSyDovLKo3djdRbs963vqKdbj-geRWyzMTrg",
      authDomain: "blackfilm-survey.firebaseapp.com",
      projectId: "blackfilm-survey",
      storageBucket: "blackfilm-survey.firebasestorage.app", // 스크린샷 기준 수정
      messagingSenderId: "360900276842",
      appId: "1:360900276842:web:90f46bcbf8dd42379ad013"
    };

    // 초기화
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const status = document.getElementById("status");

    // 버튼 클릭 이벤트
    document.getElementById("submitBtn").addEventListener("click", async () => {
      const nameValue = document.getElementById("name").value;
      const answerValue = document.getElementById("answer").value;

      if (!nameValue || !answerValue) {
        status.innerText = "값을 모두 입력하세요";
        return;
      }

      status.innerText = "전송 중...";

      try {
        console.log("데이터 전송 시도 중...");
        
        // ✅ 중복된 addDoc을 하나로 합치고 가독성 개선
        const docRef = await addDoc(collection(db, "answers"), {
          name: nameValue,
          answer: answerValue,
          createdAt: serverTimestamp() // 더 정확한 서버 시간 사용
        });

        console.log("성공! 문서 ID:", docRef.id);
        alert("성공적으로 제출되었습니다!");
        
        status.innerText = "저장 완료!";
        document.getElementById("name").value = "";
        document.getElementById("answer").value = "";

      } catch (e) {
        console.error("상세 에러 내용:", e);
        alert("에러 발생: " + e.message);
        status.innerText = "저장 실패: " + e.message;
      }
    });
  </script>
</body>
</html>
