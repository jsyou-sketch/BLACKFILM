<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>BLACKFILM 설문</title>
</head>

<body>
  <h2>설문 입력</h2>

  <input id="name" placeholder="이름" />
  <br><br>

  <input id="answer" placeholder="답변" />
  <br><br>

  <button id="submitBtn">제출</button>

  <p id="status"></p>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// 🔥 Firebase 설정 (스크린샷 기반으로 정확히 수정함)
    const firebaseConfig = {
      apiKey: "AIzaSyDovLKo3djdRbs963vqKdbj-geRWyzMTrg", // 유지
      authDomain: "blackfilm-survey.firebaseapp.com",
      projectId: "blackfilm-survey",
      storageBucket: "blackfilm-survey.firebasestorage.app", // 👈 수정됨 (스크린샷 확인)
      messagingSenderId: "360900276842",
      appId: "1:360900276842:web:90f46bcbf8dd42379ad013" // 👈 수정됨 (스크린샷의 앱 ID 전체 입력)
    };

    // 초기화
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const status = document.getElementById("status");

    // 버튼 클릭
    document.getElementById("submitBtn").addEventListener("click", async () => {
      const name = document.getElementById("name").value;
      const answer = document.getElementById("answer").value;

      if (!name || !answer) {
        status.innerText = "값을 모두 입력하세요";
        return;
      }

      try {
        await addDoc(collection(db, "answers"), {
          name: name,
          answer: answer,
          createdAt: new Date()
        });

        status.innerText = "저장 완료!";
        document.getElementById("name").value = "";
        document.getElementById("answer").value = "";

      } catch (e) {
        console.error(e);
        status.innerText = "저장 실패";
      }
    });
  </script>
</body>
</html>
