<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>설문 테스트</title>
</head>
<body>

<h2>간단 설문</h2>

이름: <input id="name"><br><br>
의견: <input id="comment"><br><br>

<button onclick="save()">제출하기</button>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDXFDLXThLaW6D1ORVNp6Ir6ApMHAkRu5o",
  authDomain: "blackfilm-survey.firebaseapp.com",
  projectId: "blackfilm-survey"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// 👉 버튼 눌렀을 때 실행되는 함수
function save(){
  const name = document.getElementById("name").value;
  const comment = document.getElementById("comment").value;

  alert("버튼 눌림"); // 👉 이거 먼저 확인

  db.collection("survey").add({
    name: name,
    comment: comment,
    time: new Date()
  })
  .then(()=>{
    alert("🔥 저장 성공");
  })
  .catch((e)=>{
    alert("❌ 실패: " + e.message);
  });
}
</script>

</body>
</html>
