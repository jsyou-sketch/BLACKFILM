<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>BLACKFILM 설문</title>
</head>
<body>
  <h2>설문 입력</h2>

  <input id="name" placeholder="이름" />
  <br><br>

  <input id="answer" placeholder="답변" />
  <br><br>

  <button id="submitBtn">제출</button>

  <p id="status"></p>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // ✅ 오타 및 경로 수정 완료
    const firebaseConfig = {
      apiKey: "AIzaSyDovLKo3djdRbs963vqKdbj-geRWyzMTrg",
      authDomain: "blackfilm-survey.firebaseapp.com",
      projectId: "blackfilm-survey",
      storageBucket: "blackfilm-survey.firebasestorage.app",
      messagingSenderId: "360900276842",
      appId: "1:360900276842:web:90f46bcbf8dd42379ad013"
    };

    // 초기화 (대소문자 일치시킴)
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const status = document.getElementById("status");

    document.getElementById("submitBtn").addEventListener("click", async () => {
      alert("TEST");
      const name = document.getElementById("name").value;
      const answer = document.getElementById("answer").value;

      if (!name || !answer) {
        status.innerText = "값을 모두 입력하세요";
        return;
      }

      status.innerText = "전송 중...";

      try {
        // answers 컬렉션에 저장
        await addDoc(collection(db, "answers"), {
          name: name,
          answer: answer,
          createdAt: serverTimestamp()
        });

        alert("성공적으로 제출되었습니다!");
        status.innerText = "저장 완료!";
        document.getElementById("name").value = "";
        document.getElementById("answer").value = "";

      } catch (e) {
        console.error("에러 상세:", e);
        alert("에러 발생: " + e.message);
        status.innerText = "저장 실패: " + e.message;
      }
    });
  </script>
</body>
</html>
